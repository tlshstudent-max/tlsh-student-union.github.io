<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正副會長室 | 斗六高中學生會</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="office-page">
    <div id="cursor-glow"></div>
    <header class="office-header">
        <a href="../index.html" class="back-link">← 返回大廳</a>
        <div class="header-content">
            <h1>正副會長室</h1>
            <p class="subtitle">願景 · 聽見 · 實踐</p>
        </div>
    </header>

    <div class="container">
        <section class="zen-section">
            <h2 class="section-title">會長寄語</h2>
            <div class="antique-quote">
                <p>「每一位斗中人的聲音，都是石澗中清澈的水滴。我們在此匯集，不是為了改變世界，而是為了讓身處的校園變得更值得被愛。」</p>
                <cite>— 學生會會長</cite>
            </div>
        </section>

        <section id="feedback">
            <h2 class="section-title">意見回饋</h2>
            <div class="zen-box">
                <p class="box-desc">你的建議將直接傳達至會長室。請像投石入水般，留下你的聲音。</p>
                
                <div id="fs-status" style="margin-bottom: 20px; font-size: 0.9rem; letter-spacing: 2px; text-align: center;">
                    <span data-fs-success style="display:none; color: #C5B358;">✨ 訊息已匯集成水，成功傳達至會長室。</span>
                    <span data-fs-error style="display:none; color: #ff6b6b;">⚠️ 傳送失敗，請檢查網路連線或稍後再試。</span>
                </div>

                <form id="my-form" class="zen-form">
                    <div class="form-group">
                        <label>你的稱呼</label>
                        <input type="text" name="name" required data-fs-field placeholder="如何稱呼您？">
                        <span data-fs-error="name" style="color: #ff6b6b; font-size: 0.7rem; display: block; margin-top: 5px;"></span>
                    </div>
                    
                    <div class="form-group">
                        <label>水滴訊息</label>
                        <textarea name="message" rows="5" required data-fs-field placeholder="請留下您的建議..."></textarea>
                        <span data-fs-error="message" style="color: #ff6b6b; font-size: 0.7rem; display: block; margin-top: 5px;"></span>
                    </div>
                    
                    <button type="submit" data-fs-submit-btn class="submit-btn"><span>匯集成水</span></button>
                </form>
            </div>
        </section>
    </div>

    <script>
        const glow = document.getElementById('cursor-glow');
        let mx = 0, my = 0, bx = 0, by = 0;
        document.addEventListener('mousemove', (e) => { mx = e.clientX; my = e.clientY; });
        function anim() {
            bx += (mx - bx) * 0.08; by += (my - by) * 0.08;
            glow.style.left = bx + 'px'; glow.style.top = by + 'px';
            requestAnimationFrame(anim);
        }
        anim();
    </script>

    <script src="https://unpkg.com/@formspree/ajax@1" defer></script>
    <script>
      window.formspree = window.formspree || function () { (formspree.q = formspree.q || []).push(arguments); };
      
      // 初始化表單：填入你的專屬 ID xwvwwloe
      formspree('initForm', { 
        formElement: '#my-form', 
        formId: 'xwvwwloe',
        // 初始化表單
  formspree('initForm', { 
    formElement: '#my-form', 
    formId: 'xwvwwloe',
    onSuccess: function() {
        // 1. 獲取表單元件
        const form = document.getElementById('my-form');
        const status = document.getElementById('fs-status');
        
        // 2. 讓表單先閃爍一下，表示「水滴已匯入」
        form.style.transition = 'opacity 0.5s';
        form.style.opacity = '0'; 

        // 3. 延遲 1 秒後：清空內容、恢復亮度
        setTimeout(() => {
            form.reset();             // 清空輸入框
            form.style.opacity = '1';  // 恢復亮度
            form.style.pointerEvents = 'auto'; // 恢復點擊功能
            
            // 4. 讓成功訊息在 5 秒後靜靜消失
            setTimeout(() => {
                const successMsg = status.querySelector('[data-fs-success]');
                if (successMsg) successMsg.style.display = 'none';
            }, 5000);
            
        }, 1000);
    }
  });
      });
    </script>
</body>
</html>
