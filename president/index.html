<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正副會長室 | 斗六高中學生會</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="office-page">
    <div id="cursor-glow"></div>
    
    <header class="office-header">
        <a href="../index.html" class="back-link">← 返回石澗大廳</a>
        <div class="header-content">
            <h1>正副會長室</h1>
            <p class="office-subtitle">願景 · 聽見 · 實踐</p>
        </div>
    </header>

    <main class="container">
        
        <section class="zen-section">
            <h2 class="section-title gold-title"><span>/ </span>會長寄語</h2>
            <div class="antique-quote">
                <p>「每一位斗中人的聲音，都是石澗中清澈的水滴。我們在此匯集，不是為了改變世界，而是為了讓身處的校園變得更值得被愛。」</p>
                <cite>— 學生會會長</cite>
            </div>
        </section>

        <section id="feedback">
            <h2 class="section-title gold-title"><span>/ </span>意見回饋</h2>
            <div class="card">
                <p class="box-desc">你的建議將直接傳達至會長室。請像投石入水般，留下你的聲音。</p>
                
                <div id="fs-status" style="min-height: 30px; margin-bottom: 20px; text-align: center;">
                    <span data-fs-success style="display:none; color: var(--zen-warm);">✨ 訊息已匯集成水，沈入石澗。</span>
                </div>

                <form id="my-form" class="zen-form">
                    <div class="form-group">
                        <label>如何稱呼您？</label>
                        <input type="text" name="name" required placeholder="例如：某同學">
                    </div>
                    
                    <div class="form-group">
                        <label>水滴訊息</label>
                        <textarea name="message" rows="5" required placeholder="請留下您的建議..."></textarea>
                    </div>
                    
                    <button type="submit" id="submit-btn" class="submit-btn">
                        <span>匯集成水</span>
                    </button>
                </form>
            </div>
        </section>
    </main>

    <footer class="centered-footer">&copy; 2026 國立斗六高級中學學生會會長室.</footer>

    <script src="https://unpkg.com/@formspree/ajax@1" defer></script>
    <script>
        // 1. 光暈動畫
        const glow = document.getElementById('cursor-glow');
        let mx = 0, my = 0, bx = 0, by = 0;
        document.addEventListener('mousemove', (e) => { mx = e.clientX; my = e.clientY; });
        function anim() {
            bx += (mx - bx) * 0.08; by += (my - by) * 0.08;
            glow.style.left = bx + 'px'; glow.style.top = by + 'px';
            requestAnimationFrame(anim);
        }
        anim();

        // 2. Formspree AJAX 邏輯 (保留會長的石落水鳴動效)
        window.formspree = window.formspree || function () { (formspree.q = formspree.q || []).push(arguments); };
        formspree('initForm', { 
            formElement: '#my-form', 
            formId: 'xwvwwloe',
            onSuccess: function() {
                const form = document.getElementById('my-form');
                const status = document.getElementById('fs-status');
                const successMsg = status.querySelector('[data-fs-success]');
                const btn = document.getElementById('submit-btn');

                btn.style.opacity = '0.5';
                btn.innerText = '已匯流';
                form.style.transition = 'opacity 0.8s';
                form.style.opacity = '0.3';
                form.style.pointerEvents = 'none';
                successMsg.style.display = 'block';

                setTimeout(() => {
                    form.reset();
                    form.style.opacity = '1';
                    form.style.pointerEvents = 'auto';
                    btn.style.opacity = '1';
                    btn.innerText = '匯集成水';
                    successMsg.style.display = 'none';
                }, 5000);
            }
        });
    </script>
</body>
</html>
